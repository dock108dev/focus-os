name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Lint backend
        run: python -m ruff check backend/app backend/tests

      - name: Scan backend source
        run: python -m bandit -q -r backend/app

      - name: Audit backend dependencies
        run: python -m pip_audit -r backend/requirements-dev.txt

      - name: Run backend tests
        run: python -m pytest

  frontend:
    name: Frontend quality gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Audit frontend dependencies
        run: npm run security:audit

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker build and publish
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write
    env:
      PUSH_IMAGES: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set Docker image names
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "API_IMAGE=ghcr.io/${repo}-api" >> "$GITHUB_ENV"
          echo "WEB_IMAGE=ghcr.io/${repo}-web" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose config
        run: |
          docker compose config
          docker compose config --no-interpolate

      - name: Build Compose services
        run: docker compose build api scheduler web

      - name: Log in to GitHub Container Registry
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:main
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:main
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
